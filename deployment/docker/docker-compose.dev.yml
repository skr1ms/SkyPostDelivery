# run: docker compose --env-file .env.dev -f deployment/docker/docker-compose.dev.yml up --build -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: hitech-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hitech-network

  minio:
    image: minio/minio:latest
    container_name: hitech-minio-dev
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_PUBLIC_URL}
      MINIO_CONSOLE_SECURE_TLS_REDIRECT: "off"
      MINIO_BROWSER_REDIRECT: "off"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hitech-network

  rabbitmq:
    image: rabbitmq:4.2.0-rc.1-management
    container_name: hitech-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-default}
    command: >
      sh -c "
        rabbitmq-plugins enable rabbitmq_management rabbitmq_prometheus &&
        rabbitmq-server
      "
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_UI_PORT:-15672}:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hitech-network
    restart: unless-stopped
    labels:
      - "logging=promtail"

  go-orchestrator:
    build:
      context: ../../backend/go-orchestrator
      dockerfile: Dockerfile
    container_name: hitech-orchestrator-dev
    environment:
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      HTTP_PORT: ${HTTP_PORT}
      GO_GRPC_PORT: ${GO_GRPC_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      QR_HMAC_SECRET: ${QR_HMAC_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_QR_CODES: ${MINIO_BUCKET_QR_CODES}
      MINIO_BUCKET_RECORDS: ${MINIO_BUCKET_RECORDS}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      SMSAERO_URL: ${SMSAERO_URL}
      SMSAERO_EMAIL: ${SMSAERO_EMAIL}
      SMSAERO_API_KEY: ${SMSAERO_API_KEY}
      GRPC_DRONE_SERVICE_URL: drone-service:${PYTHON_GRPC_PORT}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      ADMIN_PANEL_URL: ${ADMIN_PANEL_URL}
      ADMIN_FULLNAME: ${ADMIN_FULLNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PHONE: ${ADMIN_PHONE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_CREATED_AT: ${ADMIN_CREATED_AT}
      SECOND_ADMIN_FULLNAME: ${SECOND_ADMIN_FULLNAME}
      SECOND_ADMIN_EMAIL: ${SECOND_ADMIN_EMAIL}
      SECOND_ADMIN_PHONE: ${SECOND_ADMIN_PHONE}
      SECOND_ADMIN_PASSWORD: ${SECOND_ADMIN_PASSWORD}
      SECOND_ADMIN_CREATED_AT: ${SECOND_ADMIN_CREATED_AT}
      FIREBASE_CREDENTIALS_FILE: ${FIREBASE_CREDENTIALS_FILE}
    ports:
      - "${HTTP_PORT}:8080"
      - "${GO_GRPC_PORT}:50052"
      - "9091:9091"  
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hitech-network
    restart: unless-stopped
    volumes:
      - /home/takuya/googleFirebase:/app/secrets/firebase-service-account.json:ro

  drone-service:
    build:
      context: ../../
      dockerfile: backend/drone-service/Dockerfile
    container_name: hitech-drone-service-dev
    environment:
      PYTHON_GRPC_PORT: ${PYTHON_GRPC_PORT}
      DRONE_SERVICE_HTTP_PORT: ${DRONE_SERVICE_HTTP_PORT}
      DRONE_SERVICE_HTTP_URL: ${DRONE_SERVICE_HTTP_URL}
      ORCHESTRATOR_GRPC_URL: go-orchestrator:${GO_GRPC_PORT}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      DRONE_SERVICE_WEBSOCKET_INTERVAL: ${DRONE_SERVICE_WEBSOCKET_INTERVAL}
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_RECORDS: ${MINIO_BUCKET_RECORDS}
      LOG_LEVEL: DEBUG
    ports:
      - "${PYTHON_GRPC_PORT}:50051"
      - "${DRONE_SERVICE_HTTP_PORT}:8081"
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
      go-orchestrator:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hitech-network
    restart: unless-stopped

  admin-panel:
    build:
      context: ../..
      dockerfile: admin_panel/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_MINIO_URL: ${VITE_MINIO_URL}
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL}
    container_name: hitech-admin-panel-dev
    ports:
      - "80:80"
    depends_on:
      - go-orchestrator
    networks:
      - hitech-network
    restart: unless-stopped
    labels:
      - "logging=promtail"

  prometheus:
    image: prom/prometheus:latest
    container_name: hitech-prometheus-dev
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data_dev:/prometheus
    networks:
      - hitech-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: hitech-loki-dev
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data_dev:/loki
    networks:
      - hitech-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: hitech-promtail-dev
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hitech-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hitech-grafana-dev
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - hitech-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: hitech-cadvisor-dev
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/machine-id:/etc/machine-id:ro
    expose:
      - "8080"
    networks:
      - hitech-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: hitech-postgres-exporter-dev
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hitech}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hitech-network
    restart: unless-stopped
    labels:
      logging: "promtail"
      logging_jobname: "containerlogs"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: hitech-node-exporter-dev
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      - hitech-network
    restart: unless-stopped

volumes:
  postgres_data_dev:
    driver: local
  minio_data_dev:
    driver: local
  rabbitmq_data_dev:
    driver: local
  prometheus_data_dev:
    driver: local
  loki_data_dev:
    driver: local
  grafana_data_dev:
    driver: local

networks:
  hitech-network:
    driver: bridge